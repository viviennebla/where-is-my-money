services:
  backend:
    build: ./backend
    image: wimm-backend:dev
    ports: ["8000:8000"]
    volumes:
      - ${HOST_PROJECT_ROOT:-.}/backend:/app
      - dev_venv:/app/.venv
      - dev_db_data:/app/data
      - dev_uploads:/app/uploads
    env_file: .env
    environment:
      - DEEPSEEK_BASE_URL=https://api.deepseek.com/anthropic
      - DEEPSEEK_MODEL=deepseek-v4-pro
    command: >
      sh -c "pip install -q -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    image: wimm-frontend:dev
    ports: ["5173:5173"]
    volumes:
      - ${HOST_PROJECT_ROOT:-.}/frontend/src:/app/src
      - ${HOST_PROJECT_ROOT:-.}/frontend/public:/app/public
      - dev_node_modules:/app/node_modules
    environment:
      - VITE_API_BASE_URL=http://backend:8000/api/v1
    command: npm run dev -- --host 0.0.0.0

volumes:
  dev_venv:
  dev_node_modules:
  dev_db_data:
  dev_uploads:
